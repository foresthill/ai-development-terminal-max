<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Dev Terminal MAX</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="root">
      <header id="topbar">
        <div class="bar bar-projects">
          <div class="brand">AI&nbsp;DEV&nbsp;TERMINAL&nbsp;<span class="max">MAX</span></div>
          <div id="project-strip" class="project-strip"></div>
          <div class="proj-actions">
            <button id="btn-open" data-i18n="btn.folder" data-i18n-title="tip.folder">📁 folder</button>
            <button id="btn-clone" data-i18n="btn.clone" data-i18n-title="tip.clone">⎇ clone</button>
            <button id="btn-settings" data-i18n="btn.settings" data-i18n-title="tip.settings">⚙ Settings</button>
          </div>
        </div>
        <div class="bar bar-tools">
          <button id="btn-add" data-i18n="btn.add" data-i18n-title="tip.add">+ agent</button>
          <button id="btn-fill" data-i18n="btn.fill" data-i18n-title="tip.fill">⊞ fill 9</button>
          <button id="btn-zoom" data-i18n="btn.zoom" data-i18n-title="tip.zoom">⤢ zoom</button>
          <button id="btn-layout" data-i18n-title="tip.layout">▦ 3×3</button>
          <button id="btn-macro" data-i18n="btn.macro" data-i18n-title="tip.macro">✦ macro</button>
          <button id="btn-send" data-i18n="btn.send" data-i18n-title="tip.send">↗ send</button>
          <label class="perm">
            <span data-i18n="lbl.perm">perm</span>
            <select id="perm-mode" data-i18n-title="tip.perm">
              <option value="auto">auto</option>
              <option value="normal">normal</option>
              <option value="bypass">bypass ⚠</option>
            </select>
          </label>
          <button id="btn-guard" data-i18n-title="tip.guard">
            <svg class="btn-ico" viewBox="0 0 16 16"><path d="M8 2.2 L12.5 4 L12.5 8.2 C12.5 11 10.5 13 8 13.8 C5.5 13 3.5 11 3.5 8.2 L3.5 4 Z"/></svg>
            <span class="btn-txt">guard: off</span>
          </button>
          <button id="btn-nest" data-i18n-title="tip.nest">
            <svg class="btn-ico" viewBox="0 0 16 16"><rect x="2.5" y="2.5" width="11" height="11" rx="2"/><rect x="5.5" y="5.5" width="5" height="5" rx="1.2"/></svg>
            <span class="btn-txt">nest: off</span>
          </button>
          <span id="agent-count" class="count">0 agents</span>
          <div class="hint" data-i18n="hint"></div>
        </div>
      </header>
      <main id="grid" class="mode-overview"></main>
      <section id="macro" class="hidden"></section>
      <div id="sendbar" class="sendbar hidden">
        <select id="send-target">
          <option value="this" data-i18n="send.this">this agent</option>
          <option value="project" data-i18n="send.project">project</option>
          <option value="all" data-i18n="send.all">all agents</option>
        </select>
        <input id="send-input" data-i18n-ph="send.placeholder" spellcheck="false" />
        <button id="send-go" data-i18n="send.go">send</button>
      </div>
    </div>
  </body>
</html>
